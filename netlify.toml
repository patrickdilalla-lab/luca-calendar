## Netlify build config for Luca's Hub
## The site is a single static HTML file — no build step needed.

[build]
  publish = "."

# Don't let search engines or archivers cache this.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=()"
    X-Robots-Tag = "noindex, nofollow"
    # CSP. App is mostly self-contained; Google Identity + Calendar API are the only third parties.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://apis.google.com; connect-src 'self' https://www.googleapis.com https://accounts.google.com https://oauth2.googleapis.com; style-src 'self' 'unsafe-inline' https://accounts.google.com; img-src 'self' data: https://*.googleusercontent.com; font-src 'self' data:; frame-src https://accounts.google.com https://content.googleapis.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain"
