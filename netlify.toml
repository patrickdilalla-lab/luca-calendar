## Netlify build config for Luca's Hub
## The site is a single static HTML file — no build step needed.

[build]
  publish = "."

# Don't let search engines or archivers cache this.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=()"
    X-Robots-Tag = "noindex, nofollow"
    # Tight CSP. The app is fully self-contained; no third-party scripts needed.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain"
