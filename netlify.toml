## Netlify build config for Luca's Hub
## The site is a single static HTML file — no build step needed.

[build]
  publish = "."

# Don't let search engines or archivers cache this.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=()"
    X-Robots-Tag = "noindex, nofollow"
    # Allow the Netlify Identity widget + Google Calendar links. Tighten later if you add more third-party scripts.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://identity.netlify.com; connect-src 'self' https://*.netlify.app https://*.netlify.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain"
